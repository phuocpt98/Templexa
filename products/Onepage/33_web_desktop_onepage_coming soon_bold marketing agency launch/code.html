<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Bold Marketing Agency - Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&amp;family=Space+Grotesk:wght@300;400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#0057FF", // Electric Blue
                        secondary: "#FF00FF", // Hot Pink
                        accent: "#00E5FF", // Cyan accent
                        "background-light": "#FFFFFF",
                        "background-dark": "#111111",
                    },
                    fontFamily: {
                        display: ["Anton", "sans-serif"],
                        body: ["Space Grotesk", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0px", // Brutalist feel
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'float-delayed': 'float 6s ease-in-out 3s infinite',
                        'spin-slow': 'spin 12s linear infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        }
                    }
                },
            },
        };
    </script>
<style>
        .confetti-item {
            position: absolute;
            opacity: 0.8;
            pointer-events: none;
        }::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #0057FF;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #FF00FF;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col justify-between font-body transition-colors duration-300 overflow-x-hidden relative">
<div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
<div class="confetti-item top-[10%] left-[5%] text-secondary animate-float transform -rotate-12">
<span class="material-icons text-6xl">campaign</span>
</div>
<div class="confetti-item top-[20%] right-[10%] text-primary animate-float-delayed transform rotate-12">
<span class="material-icons text-7xl">bar_chart</span>
</div>
<div class="confetti-item bottom-[15%] left-[15%] text-accent animate-float transform rotate-45">
<span class="material-icons text-5xl">thumb_up</span>
</div>
<div class="confetti-item bottom-[30%] right-[20%] text-secondary animate-pulse-slow">
<span class="material-icons text-6xl">bolt</span>
</div>
<div class="confetti-item top-[50%] left-[2%] text-primary animate-spin-slow">
<span class="material-icons text-4xl">track_changes</span>
</div>
<div class="confetti-item top-[15%] left-[30%] w-4 h-16 bg-accent -rotate-45"></div>
<div class="confetti-item top-[5%] right-[25%] w-6 h-6 bg-secondary rounded-full"></div>
<div class="confetti-item bottom-[10%] right-[5%] w-12 h-3 bg-primary rotate-12"></div>
<div class="confetti-item bottom-[40%] left-[8%] w-8 h-8 border-4 border-secondary rotate-45"></div>
<div class="confetti-item top-[40%] right-[5%] w-0 h-0 border-l-[15px] border-l-transparent border-b-[25px] border-b-primary border-r-[15px] border-r-transparent rotate-12"></div>
<div class="confetti-item top-[80%] left-[40%] w-3 h-3 bg-black dark:bg-white rounded-full opacity-50"></div>
<div class="confetti-item top-[25%] right-[40%] text-black dark:text-white opacity-20 text-4xl font-bold font-display">+</div>
<div class="confetti-item bottom-[25%] left-[80%] text-black dark:text-white opacity-20 text-5xl font-bold font-display">x</div>
</div>
<nav class="relative z-10 w-full p-6 flex justify-center">
<a class="text-sm font-bold tracking-widest text-primary hover:text-secondary transition-colors uppercase border-b-2 border-transparent hover:border-secondary pb-1" href="#">Home</a>
</nav>
<main class="relative z-10 flex-grow flex flex-col items-center justify-center text-center px-4">
<div class="max-w-4xl mx-auto space-y-6">
<h1 class="font-display text-7xl md:text-9xl tracking-tight leading-none text-black dark:text-white uppercase drop-shadow-lg">
<span class="block">Coming</span>
<span class="block text-transparent bg-clip-text bg-gradient-to-r from-primary via-secondary to-accent">Soon</span>
</h1>
<p class="font-body text-xl md:text-2xl text-gray-700 dark:text-gray-300 max-w-2xl mx-auto mt-8 font-light tracking-wide">
                We are crafting a <span class="font-bold text-primary">disruptive</span> marketing experience. <br class="hidden md:inline"/> Prepare for the launch of our new digital headquarters.
            </p>
<div class="mt-12 flex flex-col items-center justify-center w-full">
<form class="flex flex-col sm:flex-row gap-4 w-full max-w-md" onsubmit="event.preventDefault();">
<input class="w-full px-6 py-4 bg-gray-50 dark:bg-gray-900 border-2 border-black dark:border-white text-black dark:text-white placeholder-gray-500 focus:outline-none focus:border-secondary focus:ring-0 font-bold uppercase tracking-wider text-sm transition-all" placeholder="ENTER YOUR EMAIL" required="" type="email"/>
<button class="w-full sm:w-auto px-8 py-4 bg-accent hover:bg-secondary text-black font-display text-xl tracking-wider uppercase transition-all hover:scale-105 border-2 border-transparent hover:border-black active:scale-95 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] dark:shadow-[4px_4px_0px_0px_rgba(255,255,255,1)]" type="submit">
                        Notify Me!
                    </button>
</form>
<p class="mt-4 text-xs text-gray-500 dark:text-gray-400 uppercase tracking-widest">
                    No spam. Just pure genius.
                </p>
</div>
</div>
</main>
<footer class="relative z-10 w-full p-6 text-center">
<div class="text-xs text-gray-500 dark:text-gray-400 font-mono">
            © 2035 BOLD AGENCY. ALL RIGHTS RESERVED. 
            <span class="mx-2">|</span>
<a class="hover:text-primary underline" href="#">PRIVACY</a>
</div>
</footer>
<div class="fixed bottom-6 right-6 z-50">
<button aria-label="Toggle Dark Mode" class="p-3 bg-white dark:bg-black border-2 border-black dark:border-white rounded-full hover:scale-110 transition-transform shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] dark:shadow-[2px_2px_0px_0px_rgba(255,255,255,1)]" onclick="document.documentElement.classList.toggle('dark')">
<span class="material-icons text-black dark:text-white text-xl block dark:hidden">dark_mode</span>
<span class="material-icons text-white text-xl hidden dark:block">light_mode</span>
</button>
</div>

</body></html>
