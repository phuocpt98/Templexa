<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Modern Split-Screen Pilates Home</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&amp;family=Lato:wght@300;400;700&amp;family=Playfair+Display:ital,wght@0,400;0,600;1,400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#8D6E63", // Deep Clay / Brown used for accents
              "background-light": "#F5F5F0", // Off-white
              "background-dark": "#121212", // Deep Charcoal
              clay: {
                DEFAULT: "#D7C4BB", // Soft Clay for Light Mode
                dark: "#2A2320",    // Darkened Clay/Charcoal for Dark Mode
              },
              charcoal: {
                DEFAULT: "#2C3E50",
                dark: "#ECF0F1",
              }
            },
            fontFamily: {
              display: ["Playfair Display", "serif"],
              sans: ["Lato", "sans-serif"],
              serif: ["Cinzel", "serif"],
            },
            borderRadius: {
              DEFAULT: "4px",
            },
          },
        },
      };
    </script>
<style>html { scroll-behavior: smooth; }.video-overlay {
            background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.4) 100%);
        }@keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }
        .animate-box {
            animation: fadeInScale 1.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-sans transition-colors duration-300">
<main class="min-h-screen w-full flex flex-col md:flex-row">
<section class="relative w-full md:w-1/2 h-[50vh] md:h-screen overflow-hidden group">
<img alt="Close up of pilates reformer springs and straps in a calm studio" class="absolute inset-0 w-full h-full object-cover transition-transform duration-[20s] ease-linear group-hover:scale-110" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAQbBgbBPrs4flqE4qYsE9rAaF8cnnzNK3Ob125XpszVVbKQcTj58SjnrXrfI2rs9tk1AieCYV4esCAzT2MIRBHwS0QtKQ06izN6kRwGmCVL2Ns5iGCJIgkUwpbybsldPvOTcAKrsKhIMV8ouMhgK-ZCycnrDsOEyAgk-3awPzwlG9l-0oAuQfQOtASgLDvCVbVIABE4lmW6hgHda_JlZyJuEt5o0aRRTs4cvb6SmjipdWYj-CQdLRzFrQZu2Nhs6o0bMOIG1edkg"/>
<div class="absolute inset-0 video-overlay"></div>
<nav class="absolute top-0 left-0 w-full p-6 md:p-10 flex justify-between items-center text-white z-10">
<div class="text-sm tracking-[0.2em] font-serif uppercase cursor-pointer hover:opacity-80 transition-opacity">
                    Home
                </div>
<button class="md:hidden text-white">
<span class="material-icons-outlined">menu</span>
</button>
</nav>
<div class="absolute inset-0 flex items-center justify-center z-10 pointer-events-none">
<div class="animate-box border-2 border-white/80 px-8 py-4 md:px-12 md:py-6 text-white text-center backdrop-blur-[2px]">
<span class="block text-xl md:text-3xl font-serif tracking-[0.3em] font-light">PILATES</span>
<span class="block text-xs md:text-sm tracking-[0.5em] mt-2 opacity-80">STUDIO</span>
</div>
</div>
<div class="absolute bottom-10 left-1/2 w-px h-16 bg-white/50 transform -translate-x-1/2 hidden md:block"></div>
</section>
<section class="w-full md:w-1/2 h-auto md:h-screen flex flex-col justify-center items-center p-8 md:p-16 lg:p-24 relative bg-clay dark:bg-clay-dark transition-colors duration-500">
<div class="max-w-md text-center space-y-8 animate-box" style="animation-delay: 0.3s;">
<h1 class="text-4xl md:text-5xl lg:text-6xl font-display text-gray-800 dark:text-gray-100 leading-tight">
                    Movement <br/>
<span class="italic font-light">Redefined</span>
</h1>
<div class="w-16 h-px bg-gray-400 dark:bg-gray-500 mx-auto"></div>
<p class="text-gray-700 dark:text-gray-300 text-lg font-light leading-relaxed">
                    Discover a sanctuary where breath meets motion. Our reformer Pilates sessions are designed to cultivate strength, length, and mindfulness in a space of pure tranquility.
                </p>
<div class="pt-4">
<a class="inline-block border border-gray-800 dark:border-gray-200 text-gray-800 dark:text-gray-200 px-10 py-4 text-sm tracking-widest uppercase hover:bg-gray-800 hover:text-white dark:hover:bg-white dark:hover:text-gray-900 transition-all duration-300 ease-in-out" href="#">
                        Book a Class
                    </a>
</div>
</div>
<div class="mt-16 md:absolute md:bottom-10 md:left-0 md:w-full flex justify-center space-x-8 text-gray-600 dark:text-gray-400">
<a aria-label="Twitter" class="hover:text-primary dark:hover:text-white transition-colors" href="#">
<svg class="w-5 h-5" fill="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24">
<path d="M23 3a10.9 10.9 0 01-3.14 1.53 4.48 4.48 0 00-7.86 3v1A10.66 10.66 0 013 4s-4 9 5 13a11.64 11.64 0 01-7 2c9 5 20 0 20-11.5a4.5 4.5 0 00-.08-.83A7.72 7.72 0 0023 3z"></path>
</svg>
</a>
<a aria-label="Instagram" class="hover:text-primary dark:hover:text-white transition-colors" href="#">
<svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24">
<rect height="20" rx="5" ry="5" width="20" x="2" y="2"></rect>
<path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37zm1.5-4.87h.01"></path>
</svg>
</a>
<a aria-label="Facebook" class="hover:text-primary dark:hover:text-white transition-colors" href="#">
<svg class="w-5 h-5" fill="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24">
<path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"></path>
</svg>
</a>
</div>
<button aria-label="Toggle Dark Mode" class="fixed top-4 right-4 z-50 p-2 bg-white/20 backdrop-blur-sm rounded-full text-gray-800 dark:text-white hover:bg-white/40 transition-all" onclick="document.documentElement.classList.toggle('dark')">
<span class="material-icons-outlined text-sm">brightness_6</span>
</button>
</section>
</main>

</body></html>
