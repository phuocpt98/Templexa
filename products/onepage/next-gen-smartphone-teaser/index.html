<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Next-Gen Smartphone Teaser</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&amp;family=Montserrat:wght@800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#3b82f6", // Electric blue for accents
                        "background-light": "#f3f4f6",
                        "background-dark": "#111827",
                        "metallic-start": "#e5e7eb",
                        "metallic-end": "#9ca3af",
                        "dark-metallic-start": "#1f2937",
                        "dark-metallic-end": "#0f172a",
                    },
                    fontFamily: {
                        display: ["Montserrat", "sans-serif"],
                        body: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                        'pill': '9999px',
                    },
                    backgroundImage: {
                        'silver-gradient': 'linear-gradient(135deg, #f9fafb 0%, #d1d5db 100%)',
                        'dark-silver-gradient': 'linear-gradient(135deg, #374151 0%, #111827 100%)',
                        'metallic-shine': 'linear-gradient(45deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.5) 50%, rgba(255,255,255,0.1) 100%)',
                    },
                    animation: {
                        'float-slow': 'float 8s ease-in-out infinite',
                        'float-medium': 'float 6s ease-in-out infinite',
                        'float-fast': 'float 4s ease-in-out infinite',
                        'spin-slow': 'spin 15s linear infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0) rotate(0deg)' },
                            '50%': { transform: 'translateY(-20px) rotate(5deg)' },
                        }
                    }
                },
            },
        };
    </script>
<style>
        .glass-shard {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            position: absolute;
            z-index: 0;
        }
        .metallic-sphere {
            background: radial-gradient(circle at 30% 30%, #f3f4f6, #9ca3af);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            position: absolute;
            border-radius: 50%;
            z-index: 0;
        }
        .dark .metallic-sphere {
            background: radial-gradient(circle at 30% 30%, #4b5563, #1f2937);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }
        .dark .glass-shard {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }.shard-1 { clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
        .shard-2 { clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%); }
        .shard-3 { clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }
        .shard-4 { clip-path: polygon(10% 25%, 35% 25%, 35% 0%, 65% 0%, 65% 25%, 90% 25%, 90% 50%, 65% 50%, 65% 100%, 35% 100%, 35% 50%, 10% 50%); }
    </style>
</head>
<body class="bg-silver-gradient dark:bg-dark-silver-gradient min-h-screen text-gray-800 dark:text-white font-body overflow-hidden relative selection:bg-primary selection:text-white transition-colors duration-500">
<header class="absolute top-0 left-0 w-full p-6 z-20 flex justify-center">
<nav>
<a class="text-sm tracking-[0.2em] font-medium text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white transition-colors uppercase" href="#">
                Home
            </a>
</nav>
</header>
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="metallic-sphere w-12 h-12 top-20 left-[15%] animate-float-slow"></div>
<div class="metallic-sphere w-6 h-6 top-40 right-[20%] animate-float-fast delay-700"></div>
<div class="metallic-sphere w-24 h-24 bottom-20 left-[10%] animate-float-medium delay-150"></div>
<div class="metallic-sphere w-4 h-4 bottom-[40%] right-[10%] animate-float-slow delay-300 opacity-60"></div>
<div class="metallic-sphere w-16 h-16 top-[15%] right-[5%] animate-float-medium opacity-80"></div>
<div class="glass-shard shard-1 w-20 h-20 top-[20%] left-[25%] animate-spin-slow opacity-40"></div>
<div class="glass-shard shard-2 w-32 h-32 bottom-[15%] right-[25%] animate-float-slow rotate-45 opacity-30"></div>
<div class="glass-shard shard-3 w-16 h-16 top-[60%] left-[8%] animate-float-fast -rotate-12 opacity-50"></div>
<div class="glass-shard shard-4 w-24 h-24 top-[10%] left-[50%] -translate-x-1/2 animate-float-medium opacity-20"></div>
<div class="glass-shard shard-1 w-10 h-10 bottom-[30%] left-[40%] animate-spin-slow delay-1000 opacity-30"></div>
<div class="glass-shard shard-3 w-14 h-28 top-[40%] right-[15%] rotate-90 animate-float-slow opacity-40"></div>
</div>
<main class="relative z-10 flex flex-col items-center justify-center min-h-screen px-4 text-center">
<div class="max-w-4xl mx-auto space-y-8">
<div class="space-y-4">
<h1 class="font-display font-black text-6xl md:text-8xl tracking-tighter text-transparent bg-clip-text bg-gradient-to-b from-gray-700 to-gray-900 dark:from-white dark:to-gray-400 drop-shadow-sm">
                    THE FUTURE<br/>IN YOUR HAND
                </h1>
<h2 class="font-display font-bold text-4xl md:text-5xl tracking-widest text-gray-400 dark:text-gray-500 uppercase opacity-60">
                    COMING SOON
                </h2>
</div>
<p class="max-w-lg mx-auto text-lg md:text-xl text-gray-600 dark:text-gray-300 font-light leading-relaxed">
                Experience precision engineering and limitless possibility. 
                We are unveiling the next generation of mobile technology very soon.
            </p>
<div class="pt-8">
<form class="flex flex-col md:flex-row items-center justify-center gap-4">
<div class="relative group">
<input class="pl-6 pr-6 py-4 w-72 md:w-80 rounded-pill bg-white/50 dark:bg-black/30 backdrop-blur-md border border-gray-300 dark:border-gray-600 text-gray-800 dark:text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-gray-400 dark:focus:ring-gray-500 transition-all shadow-lg" placeholder="Enter your email" required="" type="email"/>
</div>
<button class="relative overflow-hidden rounded-pill bg-gradient-to-r from-gray-800 to-black dark:from-gray-200 dark:to-white text-white dark:text-black font-bold tracking-wide py-4 px-10 shadow-xl hover:shadow-2xl hover:scale-105 active:scale-95 transition-all duration-300 group" type="submit">
<span class="relative z-10 flex items-center gap-2">
                            NOTIFY ME
                            <span class="material-icons-outlined text-sm">arrow_forward</span>
</span>
<div class="absolute inset-0 bg-metallic-shine opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
</button>
</form>
<p class="mt-4 text-xs text-gray-400 dark:text-gray-500 uppercase tracking-widest">
                    Be the first to know
                </p>
</div>
</div>
</main>
<footer class="absolute bottom-0 left-0 w-full py-6 text-center z-20">
<p class="text-xs text-gray-400 dark:text-gray-600 font-light">
            © 2035 Next-Gen Mobile. All rights reserved.
        </p>
</footer>
<div class="absolute top-6 right-6 z-30">
<button class="p-2 rounded-full bg-white/20 dark:bg-black/20 backdrop-blur-sm border border-gray-200 dark:border-gray-700 text-gray-600 dark:text-gray-300 hover:bg-white/40 dark:hover:bg-black/40 transition-colors" onclick="document.documentElement.classList.toggle('dark')">
<span class="material-icons-outlined block dark:hidden">dark_mode</span>
<span class="material-icons-outlined hidden dark:block">light_mode</span>
</button>
</div>

</body></html>
