<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Luxury Interior Design</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;family=Noto+Sans:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#ecb613",
                "background-light": "#f8f8f6",
                "background-dark": "#221d10",
              },
              fontFamily: {
                "display": ["Newsreader", "serif"],
                "sans": ["Noto Sans", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
        .glass-panel {
            background: rgba(34, 29, 16, 0.4); /* Darker tint for better text contrast */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        ::placeholder {
            color: #897f61;
            opacity: 0.8;
        }
    </style>
</head>
<body class="font-display text-white antialiased">
<!-- Main Container -->
<div class="relative min-h-screen w-full flex flex-col items-center justify-between overflow-hidden bg-background-dark">
<!-- Full Bleed Background Image -->
<div class="absolute inset-0 z-0">
<img alt="Sun-drenched minimalist luxury living room with beige furniture and large windows" class="h-full w-full object-cover" data-alt="Sun-drenched minimalist luxury living room with beige furniture and large windows" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCRnQca3vHEaZewRELUA7D0K2pqDo9kewAUJJgWA4izlmWQkKELKGY6huYdpR05lCTPESO0GlplveGqnkXoKciCgxCMAS5c95fxVlMJ0fsMC9wy5r1o126HwLztRkv75xQdKBCA-G0ebL7U82cHku6v2shjF0XRr_HbbbGYQ6kiN-9d22ErgkdUpkZueSNXo35Q0nGbJv_9FA7Ep3Hn7C1iPiAWnhpQZ4CpQbp8T-v6BM-ywvx9tlaGe-4JmejKWxqjq2GQMn94-A"/>
<!-- Dark Overlay for readability -->
<div class="absolute inset-0 bg-black/30"></div>
</div>
<!-- Spacer for vertical centering logic -->
<div class="flex-1 w-full flex items-center justify-center p-4 sm:p-8 relative z-10">
<!-- Glassmorphism Card -->
<div class="glass-panel w-full max-w-[640px] rounded-2xl p-8 sm:p-12 md:p-16 text-center shadow-2xl animate-fade-in-up">
<!-- Logo / Brand Indicator (Optional, using text for now) -->
<div class="mb-8 flex justify-center">
<span class="material-symbols-outlined text-primary text-5xl">diamond</span>
</div>
<!-- Headline -->
<h1 class="font-display text-4xl sm:text-5xl md:text-6xl font-medium tracking-tight text-white mb-6 leading-tight">
                    Crafting Spaces, <br/>
<span class="italic text-primary">Inspiring Lives</span>
</h1>
<!-- Subheadline -->
<p class="font-sans text-white/90 text-sm sm:text-base md:text-lg mb-10 max-w-md mx-auto leading-relaxed font-light">
                    Our new collection of timeless interiors is arriving soon. Join our exclusive list for early access to the sanctuary you deserve.
                </p>
<!-- Email Form -->
<form class="flex flex-col sm:flex-row w-full max-w-md mx-auto gap-3">
<div class="relative flex-1 group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-gray-500">mail</span>
</div>
<input class="block w-full rounded-lg border-0 bg-white/90 py-3.5 pl-10 pr-3 text-gray-900 placeholder:text-gray-500 focus:ring-2 focus:ring-primary sm:text-sm sm:leading-6 font-sans shadow-lg transition-all" placeholder="Enter your email address" type="email"/>
</div>
<button class="flex w-full sm:w-auto items-center justify-center rounded-lg bg-primary px-6 py-3.5 text-sm font-bold text-background-dark shadow-lg hover:bg-[#d9a60e] focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary transition-colors font-sans uppercase tracking-wider" type="button">
                        Notify Me
                    </button>
</form>
</div>
</div>
<!-- Footer Section -->
<footer class="relative z-10 w-full p-6 sm:p-10">
<div class="flex flex-col items-center gap-6">
<!-- Social Icons -->
<div class="flex gap-6 justify-center">
<a class="group flex items-center justify-center rounded-full border border-white/30 p-3 transition-colors hover:bg-primary hover:border-primary hover:text-background-dark" href="#">
<span class="material-symbols-outlined text-white text-[20px] group-hover:text-background-dark transition-colors">photo_camera</span> <!-- Instagram proxy -->
</a>
<a class="group flex items-center justify-center rounded-full border border-white/30 p-3 transition-colors hover:bg-primary hover:border-primary hover:text-background-dark" href="#">
<span class="material-symbols-outlined text-white text-[20px] group-hover:text-background-dark transition-colors">push_pin</span> <!-- Pinterest proxy -->
</a>
<a class="group flex items-center justify-center rounded-full border border-white/30 p-3 transition-colors hover:bg-primary hover:border-primary hover:text-background-dark" href="#">
<span class="material-symbols-outlined text-white text-[20px] group-hover:text-background-dark transition-colors">chat_bubble</span> <!-- Twitter proxy -->
</a>
<a class="group flex items-center justify-center rounded-full border border-white/30 p-3 transition-colors hover:bg-primary hover:border-primary hover:text-background-dark" href="#">
<span class="material-symbols-outlined text-white text-[20px] group-hover:text-background-dark transition-colors">business_center</span> <!-- LinkedIn proxy -->
</a>
</div>
<!-- Copyright -->
<p class="text-white/60 text-xs font-sans tracking-wide">
                    © 2024 Luxury Interiors Studio. All rights reserved.
                </p>
</div>
</footer>
</div>
</body></html>
