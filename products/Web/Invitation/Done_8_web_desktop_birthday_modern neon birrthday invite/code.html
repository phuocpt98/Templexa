<script>

                        primary: "#d946ef", // Neon Fuchsia
                        "background-light": "#f8fafc", // Slate 50

                        display: ["Montserrat", "sans-serif"],
                        body: ["Inter", "sans-serif"],

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<script>
        // Simple script to toggle dark mode for demonstration purposes
        // In a real app, this would check system preference
        document.addEventListener('DOMContentLoaded', () => {
            document.documentElement.classList.add('dark'); // Default to dark as per "Deep navy blue" description
        });
    </script>
<style>.text-stroke {
            -webkit-text-stroke: 2px white;
            color: transparent;
        }
        .dark .text-stroke {
            -webkit-text-stroke: 2px rgba(255,255,255,0.9);
        }
