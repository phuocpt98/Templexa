<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xem trước - Templexa</title>
    <link rel="icon" type="image/png" href="./assets/images/lgo-v2.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #FFFFFF;
            --bg-secondary: #F4FBFF;
            --text-primary: #0B1B2B;
            --text-secondary: #355066;
            --border-color: #D6ECF7;
            --card-bg: #FFFFFF;
        }
        [data-theme="dark"] {
            --bg-primary: #0F172A;
            --bg-secondary: #1E293B;
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
            --border-color: #1A3A4D;
            --card-bg: #1E293B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background: var(--bg-secondary);
            color: var(--text-primary);
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* ── Toolbar (mobile-frame mode — full bar) ── */
        .preview-toolbar {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 0 20px;
            height: 56px;
            min-height: 56px;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }
        /* Desktop-frame mode → ẩn toolbar bar, dùng bubble thay thế */
        .preview-toolbar.as-bubble {
            display: none;
        }

        /* ── Floating Bubble (desktop mode) ── */
        .preview-bubble {
            display: none;
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 100;
        }
        .preview-bubble.active { display: block; }
        .preview-bubble-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: rgba(99, 102, 241, 0.9);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.35);
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
            backdrop-filter: blur(8px);
        }
        .preview-bubble-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 24px rgba(99, 102, 241, 0.45);
        }
        .preview-bubble-btn svg { width: 20px; height: 20px; }
        .preview-bubble.open .preview-bubble-btn {
            background: rgba(99, 102, 241, 1);
        }
        /* Dropdown panel */
        .preview-bubble-panel {
            position: absolute;
            top: 52px;
            right: 0;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 12px;
            min-width: 200px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            opacity: 0;
            transform: translateY(-8px) scale(0.95);
            pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .preview-bubble.open .preview-bubble-panel {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }
        .bubble-panel-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            padding: 0 4px;
        }
        .bubble-panel-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        .bubble-panel-row:last-child { margin-bottom: 0; }
        /* Re-use existing toggle styles inside bubble */
        .preview-bubble-panel .preview-toggle {
            flex: 1;
        }
        .preview-bubble-panel .preview-toggle-btn {
            padding: 6px 14px;
            font-size: 0.75rem;
        }
        .preview-bubble-panel .autoscroll-toggle {
            margin-left: 0;
        }

        .preview-name {
            flex: 1;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-primary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            text-align: center;
        }

        /* ── Toggle buttons ── */
        .preview-toggle {
            display: flex;
            background: var(--bg-secondary);
            border-radius: 30px;
            padding: 3px;
            gap: 2px;
        }

        .preview-toggle-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            border: none;
            background: transparent;
            padding: 7px 18px;
            border-radius: 28px;
            font-size: 0.8rem;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.3s;
        }
        .preview-toggle-btn:hover { color: var(--text-primary); }
        .preview-toggle-btn.active {
            background: #6366F1;
            color: #fff;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
        }
        .preview-toggle-btn svg { flex-shrink: 0; }

        /* ── Auto-scroll toggle ── */
        .autoscroll-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 8px;
        }
        .autoscroll-toggle label {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            white-space: nowrap;
        }
        .autoscroll-switch {
            position: relative;
            width: 36px;
            height: 20px;
            flex-shrink: 0;
        }
        .autoscroll-switch input {
            position: absolute;
            inset: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            margin: 0;
            cursor: pointer;
            z-index: 2;
        }
        .autoscroll-slider {
            position: absolute;
            inset: 0;
            background: var(--border-color);
            border-radius: 20px;
            pointer-events: none;
            transition: background 0.3s;
        }
        .autoscroll-slider::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.3s;
        }
        .autoscroll-switch input:checked + .autoscroll-slider {
            background: #6366F1;
        }
        .autoscroll-switch input:checked + .autoscroll-slider::before {
            transform: translateX(16px);
        }

        /* ── Preview container ── */
        .preview-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: stretch;
            overflow: hidden;
            padding: 0;
            transition: padding 0.4s ease;
        }
        .preview-container.mobile-mode {
            align-items: center;
            padding: 20px;
        }

        /* ── Frame ── */
        .preview-frame {
            width: 100%;
            height: 100%;
            transition: all 0.4s ease;
            overflow: hidden;
        }
        .preview-frame.mobile {
            width: 430px;
            max-width: 430px;
            height: 932px;
            max-height: calc(100vh - 56px - 40px);
            border-radius: 50px;
            border: 6px solid #1F2937;
            box-shadow:
                0 0 0 2px #374151,
                0 20px 60px rgba(0, 0, 0, 0.2);
            position: relative;
        }
        .preview-frame.mobile::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 5px;
            background: #374151;
            border-radius: 10px;
            z-index: 2;
        }

        [data-theme="dark"] .preview-frame.mobile {
            border-color: #475569;
            box-shadow:
                0 0 0 2px #64748B,
                0 20px 60px rgba(0, 0, 0, 0.4);
        }
        [data-theme="dark"] .preview-frame.mobile::before {
            background: #64748B;
        }

        .preview-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            body {
                height: 100dvh;
                height: 100vh; /* fallback */
                height: 100dvh;
                background: transparent;
            }
            .preview-toolbar { display: none; }
            .preview-container { padding: 0; align-items: stretch; }
            .preview-container.mobile-mode { padding: 0; align-items: stretch; }
            .preview-frame,
            .preview-frame.mobile {
                width: 100%;
                max-width: 100%;
                height: 100%;
                max-height: 100%;
                border-radius: 0;
                border: none;
                box-shadow: none;
            }
            .preview-frame.mobile::before { display: none; }
        }
    </style>
</head>
<body>
    <div class="preview-toolbar">
        <span class="preview-name" id="previewName">Đang tải...</span>

        <div class="preview-toggle">
            <button class="preview-toggle-btn active" data-mode="desktop">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                    <line x1="8" y1="21" x2="16" y2="21"></line>
                    <line x1="12" y1="17" x2="12" y2="21"></line>
                </svg>
                <span class="btn-text">Desktop</span>
            </button>
            <button class="preview-toggle-btn" data-mode="mobile">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
                    <line x1="12" y1="18" x2="12.01" y2="18"></line>
                </svg>
                <span class="btn-text">Mobile</span>
            </button>
        </div>

        <div class="autoscroll-toggle">
            <div class="autoscroll-switch">
                <input type="checkbox" id="autoScrollToggle">
                <span class="autoscroll-slider"></span>
            </div>
            <label for="autoScrollToggle">Auto scroll</label>
        </div>
    </div>

    <!-- Floating bubble (desktop mode) -->
    <div class="preview-bubble" id="previewBubble">
        <button class="preview-bubble-btn" id="bubbleBtn" title="Tuỳ chọn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="1"></circle>
                <circle cx="19" cy="12" r="1"></circle>
                <circle cx="5" cy="12" r="1"></circle>
            </svg>
        </button>
        <div class="preview-bubble-panel">
            <div class="bubble-panel-label">Chế độ xem</div>
            <div class="bubble-panel-row">
                <div class="preview-toggle">
                    <button class="preview-toggle-btn active" data-mode="desktop" data-bubble="1">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                            <line x1="8" y1="21" x2="16" y2="21"></line>
                            <line x1="12" y1="17" x2="12" y2="21"></line>
                        </svg>
                        <span>Desktop</span>
                    </button>
                    <button class="preview-toggle-btn" data-mode="mobile" data-bubble="1">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
                            <line x1="12" y1="18" x2="12.01" y2="18"></line>
                        </svg>
                        <span>Mobile</span>
                    </button>
                </div>
            </div>
            <div class="bubble-panel-label">Auto scroll</div>
            <div class="bubble-panel-row">
                <div class="autoscroll-toggle">
                    <div class="autoscroll-switch">
                        <input type="checkbox" id="bubbleAutoScroll">
                        <span class="autoscroll-slider"></span>
                    </div>
                    <label for="bubbleAutoScroll">Tự động cuộn</label>
                </div>
            </div>
        </div>
    </div>

    <div class="preview-container" id="previewContainer">
        <div class="preview-frame" id="previewFrame">
            <iframe id="previewIframe" title="Preview"></iframe>
        </div>
    </div>

    <script src="./assets/js/data.js"></script>
    <script>
        (function () {
            // ── Dark mode ──
            const saved = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', saved);

            // ── URL params ──
            const params = new URLSearchParams(location.search);
            const id = params.get('id') || '';

            // ── Load product by ID from data.js, fallback to legacy params ──
            let url = '', name = '', category = '', type = '';
            const product = id ? (typeof getProductById === 'function' ? getProductById(Number(id)) : null) : null;

            if (product) {
                url = product.demoUrl || '';
                name = product.name || '';
                category = product.category || '';
                type = product.type || '';
            } else {
                // Fallback: legacy ?d= (base64) or ?url= params
                const d = params.get('d') || '';
                url = d ? decodeURIComponent(atob(d)) : (params.get('url') || '');
                name = params.get('name') || '';
                category = params.get('category') || '';
                type = params.get('type') || '';
            }

            // ── Default mode: mobile for invitation type, desktop otherwise ──
            const defaultMobile = (type === 'invitation');

            // ── Populate ──
            document.title = (name || 'Xem trước') + ' - Templexa';
            document.getElementById('previewName').textContent = name || 'Xem trước';
            document.getElementById('previewIframe').src = url;

            // ── Hide scrollbar in iframe (mobile mode) ──
            var iframe = document.getElementById('previewIframe');
            var scrollbarHidden = false;

            function hideIframeScrollbar() {
                if (scrollbarHidden) return;
                try {
                    var iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                    var style = iframeDoc.createElement('style');
                    style.id = 'templexa-hide-scrollbar';
                    style.textContent =
                        'html::-webkit-scrollbar { display: none !important; }' +
                        'html { scrollbar-width: none !important; -ms-overflow-style: none !important; }';
                    iframeDoc.head.appendChild(style);
                    scrollbarHidden = true;
                } catch (e) { /* cross-origin — ignore */ }
            }

            // ── Auto-scroll ──
            var autoScrollId = null;
            var autoScrollTimer = null;
            var autoScrollStopped = false;
            var SCROLL_SPEED = 0.6; // px per frame (~36px/s at 60fps)

            function killAutoScroll(syncCheckbox) {
                autoScrollStopped = true;
                if (autoScrollId) { cancelAnimationFrame(autoScrollId); autoScrollId = null; }
                if (autoScrollTimer) { clearInterval(autoScrollTimer); autoScrollTimer = null; }
                // Only uncheck when user manually stops (not when restarting)
                if (syncCheckbox !== false) {
                    var cb = document.getElementById('autoScrollToggle');
                    if (cb) cb.checked = false;
                }
            }

            // Resume from current position (for checkbox toggle)
            function resumeAutoScroll() {
                killAutoScroll(false);
                autoScrollStopped = false;
                try {
                    var iframeWin = iframe.contentWindow;
                    var iframeDoc = iframeWin.document;

                    function getScrollInfo() {
                        var scrollEl = iframeDoc.scrollingElement || iframeDoc.documentElement;
                        var bodyEl = iframeDoc.body;
                        var scrollTop = Math.max(scrollEl.scrollTop, bodyEl ? bodyEl.scrollTop : 0);
                        var scrollHeight = Math.max(scrollEl.scrollHeight, bodyEl ? bodyEl.scrollHeight : 0);
                        var clientHeight = scrollEl.clientHeight || iframeWin.innerHeight;
                        return { scrollTop: scrollTop, maxScroll: scrollHeight - clientHeight };
                    }
                    function doScroll() {
                        if (autoScrollStopped) return false;
                        var info = getScrollInfo();
                        if (info.maxScroll <= 0 || info.scrollTop >= info.maxScroll - 1) return false;
                        iframeWin.scrollBy(0, SCROLL_SPEED);
                        return true;
                    }
                    function scrollStep() {
                        if (autoScrollStopped) return;
                        if (!doScroll()) { autoScrollId = null; return; }
                        autoScrollId = requestAnimationFrame(scrollStep);
                    }

                    // Re-bind stop listeners
                    iframeWin.addEventListener('wheel', killAutoScroll, { once: true, passive: true });
                    iframeWin.addEventListener('touchmove', killAutoScroll, { once: true, passive: true });
                    iframeWin.addEventListener('keydown', function (e) {
                        if (['ArrowUp', 'ArrowDown', 'Space', 'PageUp', 'PageDown', 'Home', 'End'].indexOf(e.key) !== -1) {
                            killAutoScroll();
                        }
                    }, { once: true });

                    // Start immediately from current position
                    autoScrollId = requestAnimationFrame(scrollStep);
                    autoScrollTimer = setInterval(function () {
                        if (autoScrollStopped || !doScroll()) {
                            clearInterval(autoScrollTimer);
                            autoScrollTimer = null;
                        }
                    }, 16);
                } catch (e) { /* cross-origin */ }
            }

            function startAutoScroll() {
                killAutoScroll(false);
                autoScrollStopped = false;
                var scrollStartTime = Date.now();

                try {
                    var iframeWin = iframe.contentWindow;
                    var iframeDoc = iframeWin.document;

                    // Auto-dismiss envelope overlay (wedding invitations)
                    var envelope = iframeDoc.querySelector('.envelope-overlay:not(.opened)');
                    if (envelope) {
                        envelope.classList.add('opened');
                        envelope.style.opacity = '0';
                        envelope.style.visibility = 'hidden';
                        envelope.style.pointerEvents = 'none';
                    }

                    // Get scroll position reliably across browsers
                    function getScrollInfo() {
                        var scrollEl = iframeDoc.scrollingElement || iframeDoc.documentElement;
                        var bodyEl = iframeDoc.body;
                        var scrollTop = Math.max(scrollEl.scrollTop, bodyEl ? bodyEl.scrollTop : 0);
                        var scrollHeight = Math.max(scrollEl.scrollHeight, bodyEl ? bodyEl.scrollHeight : 0);
                        var clientHeight = scrollEl.clientHeight || iframeWin.innerHeight;
                        return { scrollTop: scrollTop, maxScroll: scrollHeight - clientHeight };
                    }

                    // Scroll using scrollBy (more reliable on mobile)
                    function doScroll() {
                        if (autoScrollStopped) return false;
                        var info = getScrollInfo();
                        if (info.maxScroll <= 0 || info.scrollTop >= info.maxScroll - 1) return false;
                        iframeWin.scrollBy(0, SCROLL_SPEED);
                        return true;
                    }

                    // Primary: requestAnimationFrame loop
                    function scrollStep() {
                        if (autoScrollStopped) return;
                        if (!doScroll()) { autoScrollId = null; return; }
                        autoScrollId = requestAnimationFrame(scrollStep);
                    }

                    // Only manual scroll stops auto-scroll (wheel, touch-drag, keyboard)
                    iframeWin.addEventListener('wheel', killAutoScroll, { once: true, passive: true });
                    iframeWin.addEventListener('touchmove', killAutoScroll, { once: true, passive: true });
                    iframeWin.addEventListener('keydown', function (e) {
                        if (['ArrowUp', 'ArrowDown', 'Space', 'PageUp', 'PageDown', 'Home', 'End'].indexOf(e.key) !== -1) {
                            killAutoScroll();
                        }
                    }, { once: true });

                    // Wait for images, then begin
                    function beginScroll() {
                        if (autoScrollStopped) return;
                        // Disable smooth scroll
                        try {
                            var resetStyle = iframeDoc.createElement('style');
                            resetStyle.id = 'templexa-reset-scroll';
                            resetStyle.textContent = 'html, body { scroll-behavior: auto !important; }';
                            iframeDoc.head.appendChild(resetStyle);
                        } catch (e) {}

                        // If images took > 500ms, start immediately; otherwise wait remaining time
                        var elapsed = Date.now() - scrollStartTime;
                        var remaining = Math.max(0, 500 - elapsed);

                        setTimeout(function () {
                            if (autoScrollStopped) return;
                            // Start RAF-based scroll
                            autoScrollId = requestAnimationFrame(scrollStep);
                            // Fallback: setInterval for browsers where RAF doesn't fire in iframe
                            autoScrollTimer = setInterval(function () {
                                if (autoScrollStopped || !doScroll()) {
                                    clearInterval(autoScrollTimer);
                                    autoScrollTimer = null;
                                }
                            }, 16);
                        }, remaining);
                    }

                    var images = iframeDoc.querySelectorAll('img');
                    var pending = 0;
                    var started = false;

                    function checkReady() {
                        if (started) return;
                        pending--;
                        if (pending <= 0) { started = true; beginScroll(); }
                    }

                    images.forEach(function (img) {
                        if (!img.complete) { pending++; img.addEventListener('load', checkReady); img.addEventListener('error', checkReady); }
                    });

                    if (pending === 0) { started = true; beginScroll(); }

                    // Fallback: start after 3s even if some images are still loading
                    setTimeout(function () {
                        if (!started && !autoScrollStopped) { started = true; beginScroll(); }
                    }, 3000);

                } catch (e) { /* cross-origin — ignore */ }
            }

            // ── Bubble / Toolbar mode ──
            var toolbar = document.querySelector('.preview-toolbar');
            var bubble = document.getElementById('previewBubble');
            var bubbleBtn = document.getElementById('bubbleBtn');
            var bubbleAutoScroll = document.getElementById('bubbleAutoScroll');

            function setDesktopMode() {
                toolbar.classList.add('as-bubble');
                bubble.classList.add('active');
            }
            function setMobileMode() {
                toolbar.classList.remove('as-bubble');
                bubble.classList.remove('active');
                bubble.classList.remove('open');
            }

            // Bubble toggle open/close
            bubbleBtn.addEventListener('click', function (e) {
                e.stopPropagation();
                bubble.classList.toggle('open');
            });
            // Click ngoài bubble → đóng
            document.addEventListener('click', function (e) {
                if (!bubble.contains(e.target)) {
                    bubble.classList.remove('open');
                }
            });
            // Click trong iframe → đóng bubble
            function closeBubbleFromIframe() {
                try {
                    iframe.contentWindow.addEventListener('click', function () {
                        bubble.classList.remove('open');
                    }, { passive: true });
                } catch (e) {}
            }

            // Sync bubble auto-scroll checkbox với toolbar checkbox
            bubbleAutoScroll.addEventListener('change', function () {
                autoScrollCheckbox.checked = this.checked;
                autoScrollCheckbox.dispatchEvent(new Event('change'));
            });

            iframe.addEventListener('load', function () {
                scrollbarHidden = false;
                hideIframeScrollbar();
                closeBubbleFromIframe();
                if (autoScrollCheckbox.checked) {
                    startAutoScroll();
                }

                // ── Protect iframe content ──
                try {
                    var iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                    // Block right-click
                    iframeDoc.addEventListener('contextmenu', function (e) { e.preventDefault(); });
                    // Block select all, copy, save, view source, print, find
                    iframeDoc.addEventListener('keydown', function (e) {
                        if ((e.ctrlKey || e.metaKey) && 'acspufACSpUF'.indexOf(e.key) !== -1) {
                            e.preventDefault();
                        }
                        // Block F12
                        if (e.key === 'F12') e.preventDefault();
                        // Block Ctrl+Shift+I/J/C (DevTools)
                        if ((e.ctrlKey || e.metaKey) && e.shiftKey && 'ijcIJC'.indexOf(e.key) !== -1) {
                            e.preventDefault();
                        }
                    });
                    // Block copy event
                    iframeDoc.addEventListener('copy', function (e) { e.preventDefault(); });
                    // Block drag
                    iframeDoc.addEventListener('dragstart', function (e) { e.preventDefault(); });
                    // Block text selection
                    var noSelect = iframeDoc.createElement('style');
                    noSelect.textContent = '* { -webkit-user-select: none !important; -moz-user-select: none !important; -ms-user-select: none !important; user-select: none !important; }';
                    iframeDoc.head.appendChild(noSelect);
                } catch (e) {}
            });

            // ── Protect preview page ──
            // Block right-click
            document.addEventListener('contextmenu', function (e) { e.preventDefault(); });
            // Block keyboard shortcuts
            document.addEventListener('keydown', function (e) {
                // Block Ctrl+S, Ctrl+U, Ctrl+P, Ctrl+A, Ctrl+C, Ctrl+F
                if ((e.ctrlKey || e.metaKey) && 'acspufACSpUF'.indexOf(e.key) !== -1) {
                    e.preventDefault();
                }
                // Block F12
                if (e.key === 'F12') e.preventDefault();
                // Block Ctrl+Shift+I/J/C (DevTools shortcuts)
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && 'ijcIJC'.indexOf(e.key) !== -1) {
                    e.preventDefault();
                }
            });
            // Block copy
            document.addEventListener('copy', function (e) { e.preventDefault(); });
            // Block drag
            document.addEventListener('dragstart', function (e) { e.preventDefault(); });

            // ── Auto-scroll checkbox ──
            var autoScrollCheckbox = document.getElementById('autoScrollToggle');
            autoScrollCheckbox.addEventListener('change', function () {
                if (this.checked) {
                    resumeAutoScroll();
                } else {
                    killAutoScroll(false);
                }
            });

            // ── Toggle Desktop / Mobile ──
            const toggleBtns = document.querySelectorAll('.preview-toggle-btn');
            const frame = document.getElementById('previewFrame');
            const container = document.getElementById('previewContainer');

            function applyMode(mode) {
                // Sync all toggle buttons (toolbar + bubble)
                toggleBtns.forEach(function (b) {
                    b.classList.toggle('active', b.dataset.mode === mode);
                });

                if (mode === 'mobile') {
                    frame.classList.add('mobile');
                    container.classList.add('mobile-mode');
                    setMobileMode(); // toolbar bar hiện, bubble ẩn
                } else {
                    frame.classList.remove('mobile');
                    container.classList.remove('mobile-mode');
                    setDesktopMode(); // toolbar bar ẩn, bubble hiện
                }

                // Restart auto-scroll on mode switch if enabled
                if (autoScrollCheckbox.checked) {
                    startAutoScroll();
                }
            }

            // Apply default mode
            if (defaultMobile) {
                applyMode('mobile');
            } else {
                applyMode('desktop');
            }

            toggleBtns.forEach(function (btn) {
                btn.addEventListener('click', function () {
                    applyMode(btn.dataset.mode);
                    // Đóng bubble sau khi chọn
                    bubble.classList.remove('open');
                });
            });
        })();
    </script>
</body>
</html>
