<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sinh Nhật TY NI 18+ 🎂</title>

    <!-- OG Meta — Facebook, Zalo, Messenger preview -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Sinh Nhật TY NI 18+ 🎂">
    <meta property="og:description" content="Trân trọng kính mời bạn đến chung vui trong bữa tiệc sinh nhật của TY NI">
    <meta property="og:image" content="https://cache.giaohangtietkiem.vn/d/20ace4609cf03fdec51af63f718bede1.jpg">
    <meta property="og:url" content="https://templexa.vn/birthday/ty-ni/index.html">
    <meta property="og:site_name" content="Templexa">
    <meta property="og:locale" content="vi_VN">

    <style>
        * { margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
    </style>
</head>
<body>
    <iframe id="f" allowfullscreen allow="autoplay"></iframe>
    <script src="../config.js"></script>
    <script>
        (function () {
            var parts = location.pathname.replace(/\/index\.html$/i, '').split('/').filter(Boolean);
            var slug = parts[parts.length - 1];
            var entry = (typeof BIRTHDAY !== 'undefined') && BIRTHDAY[slug];
            if (entry) {
                var base = location.pathname.replace(/\/birthday\/[^/]+\/.*$/, '/');
                var fullSrc = base + entry.src.replace(/^\.\.\/\.\.\//,'');
                document.getElementById('f').src = fullSrc + location.search + location.hash;
            } else {
                document.body.innerHTML = '<p style="text-align:center;padding:40px;font-family:sans-serif;color:#666">Không tìm thấy thiệp. Vui lòng kiểm tra lại đường dẫn.</p>';
            }
        })();
    </script>
</body>
</html>
